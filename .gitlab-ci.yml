include:
  - project: eiseron/stack/ci
    file: /templates/sync-github.yml
    ref: v0.1.7
  - project: eiseron/stack/ci
    file: /templates/preview-pages-trigger.yml
    ref: v0.9.7
    inputs:
      pages_project: afinados-site
      dist_dir: .vitepress/dist
      build_job: build

stages:
  - build
  - deploy
  - sync

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  stage: build
  image: node:22-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm run check:seo
  artifacts:
    paths:
      - .vitepress/dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: node:22-alpine
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - npx wrangler@4 pages deploy .vitepress/dist --project-name=afinados-site --branch=main
  environment:
    name: production
    url: https://afinados.io

sync-github:
  tags: []
